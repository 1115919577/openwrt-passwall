name: Sync Fork

on:
  schedule:
    # 定时任务，使用cron表达式，以下示例为每天北京时间8点运行
    - cron: '0 0 * * *' 
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Sync with upstream
        uses: repo-sync/github-sync@v3
        with:
          # 把这里改成 原作者的用户名/仓库名
          source_repo: Openwrt-Passwall/openwrt-passwall
          target_branch: main
          source_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
